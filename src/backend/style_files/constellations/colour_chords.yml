name: 'Colour Chords'

description: >
  'Brightest stars appear first, 
  with colour mapped to pitch. Sustained Synth base sound.'

sound: 'Default Synth'

parameters:
    
  - input: 'magnitude'
    output: 'volume'
    output_range: [0.2, 1]

  - input: 'colour'
    output: 'pitch'

  - input: 'magnitude'
    input_range: ['0%', '110%']
    output: 'time'

  - input: 'ra'
    output: 'azimuth'
    output_range: [0.25, 0.75]


harmony: 'E7sus4'
  


  
  
  

