name: 'Harp Trails'

description: >
  'The stars in the constellation appear left to right, 
  with stars with a higher altitude mapped to higher pitch. Brighter stars are louder. Harp base sound.'

sound: 'Harp'

parameters:
    
  - input: 'magnitude'
    output: 'volume'
    output_range: [0.2, 1]

  - input: 'dec'
    output: 'pitch'

  - input: 'ra'
    input_range: ['0%', '210%']
    output: 'time'

  - input: 'ra'
    output: 'azimuth'
    output_range: [0.25, 0.75]


harmony: 'E7sus4'
  


  
  
  

