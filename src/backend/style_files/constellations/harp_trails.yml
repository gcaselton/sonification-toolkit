name: 'Harp Trails'

description: >
  The stars in the constellation appear left to right, 
  with stars with a higher altitude mapped to higher pitch. Brighter stars are louder. Harp base sound.

sound: 'Harp'
preset: 'sustain'
mods:
  looping: 'forwardback'
  loop_start: 0.4
  loop_end: 3.

parameters:
    
  - input: 'magnitude'
    output: 'volume'
    output_range: [0.2, 1]
    function: 'invert'

  - input: 'dec'
    output: 'pitch'

  - input: 'ra_corrected'
    input_range: ['0%', '210%']
    output: 'time'
    function: 'invert'

  - input: 'ra_corrected'
    output: 'azimuth'
    output_range: [0.25, 0.75]
    function: 'invert'

harmony: ['C3', 'D3', 'E3', 'G3', 'A3', 'B3', 'C4', 'D4', 'E4', 'G4']
  


  
  
  

