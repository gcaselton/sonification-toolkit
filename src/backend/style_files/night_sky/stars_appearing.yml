name: 'Stars Appearing'

description: 'A glockenspiel plays the brightest stars first, with pitch mapped to colour.'

sound: 'Glockenspiel'

parameters:
  
  - input: 'colour'
    output: 'pitch'
    function: 'invert'

  - input: 'magnitude'
    output: 'volume'
    output_range: [0.1, 1]
    function: 'invert'

  - input: 'magnitude'
    input_range: ['0%', '110%']
    output: 'time'

  - input: 'relative_az'
    output: 'azimuth'

harmony: ['C#3', 'F#3', 'G#3', 'D#4', 'F4']