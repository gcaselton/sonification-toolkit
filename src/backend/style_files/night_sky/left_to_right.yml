name: 'Left to Right'

description: 'Stars appear from left to right, brighter stars are louder. Pitch mapped to colour.'

sound: 'Glockenspiel'

parameters:
  
  - input: 'colour'
    output: 'pitch'
    function: 'invert'

  - input: 'magnitude'
    output: 'volume'
    output_range: [0.1, 1]
    function: 'invert'

  - input: 'relative_az'
    input_range: ['0%', '110%']
    output: 'time'

  - input: 'relative_az'
    output: 'azimuth'
    output_range: [0.25, 0.75]

harmony: ['C#3', 'F#3', 'G#3', 'D#4', 'F4']