name: 'Night Harp'

description: 'A harp plays the night sky from brightest to dimmest stars, where higher notes signify bluer/hotter stars.'

sound: 'Harp'

parameters:
  
  - input: 'colour'
    output: 'pitch'
    function: 'invert'

  - input: 'magnitude'
    output: 'volume'
    output_range: [0.1, 1]
    function: 'invert'

  - input: 'magnitude'
    input_range: ['0%', '120%']
    output: 'time'

  - input: 'relative_az'
    output: 'azimuth'

harmony: ['F2', 'C2', 'F3', 'A3', 'E4', 'G4']