name: 'Orchestra'

description: 'An orchestra plays the night sky from brightest to dimmest stars, where higher notes signify bluer/hotter stars.'

sound: 'Orchestra'
preset: 'staccato'
mods: 
  volume_envelope: 
    R: 4

parameters:
  
  - input: 'colour'
    output: 'pitch'
    function: 'invert'

  - input: 'magnitude'
    output: 'volume'
    output_range: [0.1, 1]
    function: 'invert'

  - input: 'magnitude'
    input_range: ['0%', '120%']
    output: 'time'

  - input: 'relative_az'
    output: 'azimuth'
    output_range: [0.25, 0.75]

harmony: ['F2', 'C2', 'F3', 'A3', 'E4', 'G4']