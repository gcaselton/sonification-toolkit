name: "Power Hum"

description: "A whirring synth increases with pitch as star brightness increases."

sound: "Dark Drone"

mods:
  looping: 'forwardback'
  loop_start: 0
  loop_end: 5.

parameters:
  - input: "flux"
    output: "pitch"
    output_range: [3, 15]

  - input: 'time'
    output: 'time'